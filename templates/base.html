{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Blog</title>

    <link href="https://getbootstrap.com/docs/4.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/blog.css' %}" rel="stylesheet">
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <header class="blog-header py-3">
    <div class="row justify-content-between align-items-center">

      <!-- LOGO -->
      <div class="col-4">
        <a class="blog-header-logo text-dark" href="/">Django Blog</a>
      </div>

      <!-- SEARCH (SAFE VERSION) -->
      <div class="col-4">
        <form action="#" method="GET">   <!-- ❌ removed url 'search' -->
          <div class="input-group">
            <input class="form-control" type="text" placeholder="Search..." />
            <button class="btn btn-warning" type="submit">Go</button>
          </div>
        </form>
      </div>

      <!-- AUTH BUTTONS (SAFE VERSION) -->
      <div class="col-4 text-right">
        <a class="btn btn-sm btn-warning" href="#">Login</a>
        <a class="btn btn-sm btn-outline-secondary" href="#">Register</a>
      </div>

    </div>
  </header>

  <!-- CATEGORY NAV (SAFE) -->
  <div class="nav-scroller py-1 mb-2">
    <nav class="nav d-flex justify-content-between">
      {% for cat in categories %}
        <span class="p-2 text-muted">{{ cat.category_name }}</span>
      {% endfor %}
    </nav>
  </div>

  <!-- CONTENT -->
  {% block content %}
  {% endblock %}

</div>

<!-- FOOTER -->
<footer class="blog-footer text-center mt-5">
  <p>Blog built with ❤️ by Ankit Shende</p>
</footer>

</body>
</html>
